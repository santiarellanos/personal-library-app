<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Search</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 48px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .search-panel {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-panel input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-panel input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .search-panel button {
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-panel button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.25);
    }

    .search-panel button:active {
      transform: translateY(0);
    }

    .status {
      min-height: 24px;
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }

    .book-card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.16);
    }

    .cover-wrap {
      background: #e5e7eb;
      aspect-ratio: 2 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-cover {
      color: #4b5563;
      font-size: 0.9rem;
      text-align: center;
      padding: 8px;
    }

    .book-info {
      padding: 12px;
    }

    .book-title {
      margin: 0 0 6px;
      font-size: 0.98rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .book-author {
      margin: 0;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.35;
    }

    @media (max-width: 520px) {
      .search-panel {
        flex-direction: column;
      }

      .search-panel button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Book Finder</h1>
    <div class="search-panel">
      <input id="queryInput" type="text" placeholder="Enter a book title..." />
      <button id="searchBtn" type="button">Search</button>
    </div>
    <div id="status" class="status"></div>
    <div id="results" class="results"></div>
  </div>

  <script>
    const queryInput = document.getElementById("queryInput");
    const searchBtn = document.getElementById("searchBtn");
    const results = document.getElementById("results");
    const statusText = document.getElementById("status");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function createBookCard(book) {
      const info = book.volumeInfo || {};
      const title = escapeHtml(info.title || "Untitled");
      const authors = escapeHtml((info.authors && info.authors.join(", ")) || "Unknown Author");
      const img = info.imageLinks && (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail);

      return `
        <article class="book-card">
          <div class="cover-wrap">
            ${
              img
                ? `<img src="${img}" alt="Cover of ${title}" loading="lazy" />`
                : `<div class="no-cover">No cover available</div>`
            }
          </div>
          <div class="book-info">
            <h2 class="book-title">${title}</h2>
            <p class="book-author">${authors}</p>
          </div>
        </article>
      `;
    }

    async function searchBooks() {
      const query = queryInput.value.trim();

      if (!query) {
        statusText.textContent = "Please enter a book title.";
        results.innerHTML = "";
        return;
      }

      statusText.textContent = "Searching...";
      results.innerHTML = "";

      try {
        const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("Could not fetch books right now.");
        }

        const data = await response.json();
        const items = (data.items || []).slice(0, 5);

        if (items.length === 0) {
          statusText.textContent = "No books found. Try another title.";
          return;
        }

        statusText.textContent = `Showing ${items.length} result${items.length > 1 ? "s" : ""}.`;
        results.innerHTML = items.map(createBookCard).join("");
      } catch (error) {
        statusText.textContent = "Something went wrong while fetching books. Please try again.";
      }
    }

    searchBtn.addEventListener("click", searchBooks);
    queryInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchBooks();
      }
    });
  </script>
</body>
</html>
